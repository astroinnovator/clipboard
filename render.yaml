services:
  - type: web
    name: clipboard-app
    runtime: python3
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn server:app --host 0.0.0.0 --port $PORT"
    plan: free
    branch: main
    healthCheckPath: /
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: SESSION_SECRET_KEY
        generateValue: true
      - key: ADMIN_SECRET_KEY
        sync: false
      - key: USER_SECRET_KEY
        sync: false
      - key: GLOBAL_SECRET_KEY
        sync: false
      - key: DEFAULT_ADMIN_USERNAME
        sync: false
      - key: DEFAULT_ADMIN_PASSWORD
        sync: false
      - key: DEFAULT_USER_USERNAME
        sync: false
      - key: DEFAULT_USER_PASSWORD
        sync: false
      - key: API_BASE_URL
        fromService:
          type: web
          name: clipboard-app
          property: host
      - key: ENVIRONMENT
        value: production
      - key: PYTHON_VERSION
        value: 3.11.0

  - type: pserv
    name: clipboard-db
    runtime: postgres
    plan: free

databases:
  - name: clipboard-postgres
    plan: free
